apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ekslambda-dev-order-api
  namespace: argocd
  labels:
    project: ekslambda
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_GITHUB_ORG/eks-lambda-gitops-observability.git
    targetRevision: main
    path: helm/order-api
    helm:
      releaseName: ekslambda-dev-order-api
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ekslambda-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
